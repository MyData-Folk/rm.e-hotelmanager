services:
  hotel-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hoteldb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - hotel-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hoteldb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  hotel-rm-backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
      ENV: production
      USER_WEB_ORIGIN: ${USER_WEB_ORIGIN:?USER_WEB_ORIGIN is required}
      ADMIN_WEB_ORIGIN: ${ADMIN_WEB_ORIGIN:?ADMIN_WEB_ORIGIN is required}
      DEFAULT_RATE_SOURCE_MODE: ${DEFAULT_RATE_SOURCE_MODE:-hybrid}
    depends_on:
      hotel-db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  hotel-rm-admin-web:
    build:
      context: ./apps/admin-web
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    expose:
      - "8080"
    depends_on:
      - hotel-rm-backend
    restart: unless-stopped

  hotel-rm-user-web:
    build:
      context: ./apps/user-web
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    expose:
      - "8080"
    depends_on:
      - hotel-rm-backend
    restart: unless-stopped

volumes:
  hotel-db-data:
